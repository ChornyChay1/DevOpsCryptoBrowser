name: CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]
    types: [ closed ]
  workflow_dispatch:

jobs:
  # 1. Бэкенд тесты
  backend-test:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
      - name: Backend install
        working-directory: ./backend
        run: pip install -r requirements.txt
      - name: Backend test
        working-directory: ./backend
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
          echo "APP_NAME=\"Trading Indicators API\"" >> .env
          echo "DEBUG=false" >> .env
          echo "ENVIRONMENT=development" >> .env
          echo "LOG_LEVEL=INFO" >> .env
          echo "LOG_FORMAT=text" >> .env
          echo "LOG_TO_CONSOLE=true" >> .env
          echo "LOG_TO_FILE=true" >> .env
          echo "LOG_DIR=logs" >> .env
          echo "LOG_FILE_MAX_BYTES=10485760" >> .env
          echo "LOG_FILE_BACKUP_COUNT=5" >> .env
          pytest tests/ -v

  # 2. Бэкенд билд + SonarQube
  backend-build:
    needs: backend-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
      - name: Backend install
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install pytest-cov
      - name: Generate coverage report
        working-directory: ./backend
        run: |
          echo "APP_NAME=\"Trading Indicators API\"" > .env
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
          echo "DEBUG=false" >> .env
          echo "ENVIRONMENT=development" >> .env
          echo "LOG_LEVEL=INFO" >> .env
          echo "LOG_FORMAT=text" >> .env
          echo "LOG_TO_CONSOLE=true" >> .env
          echo "LOG_TO_FILE=true" >> .env
          echo "LOG_DIR=logs" >> .env
          echo "LOG_FILE_MAX_BYTES=10485760" >> .env
          echo "LOG_FILE_BACKUP_COUNT=5" >> .env
          pytest --cov=. --cov-report=xml:coverage.xml
      - name: Debug files
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== List all files ==="
          find . -name "*.py" | head -30
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SSH_HOST }}:9000
        with:
          args: >
            -Dsonar.projectKey=crypto-backend
            -Dsonar.python.coverage.reportPaths=backend/coverage.xml
            -Dsonar.sources=backend
            -Dsonar.tests=backend/tests
            -Dsonar.exclusions=**/venv/**,**/__pycache__/**,**/migrations/**
            -Dsonar.inclusions=backend/**/*.py
      - name: SonarQube Quality Gate check
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # 3. Фронтенд тесты
  frontend-test:
    needs: backend-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
      - name: Frontend install
        working-directory: ./frontend
        run: npm install
      - name: Frontend test
        working-directory: ./frontend
        run: npm test -- --watchAll=false

  # 4. Фронтенд билд
  frontend-build:
    needs: frontend-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
      - name: Frontend install
        working-directory: ./frontend
        run: npm install

  # 5. Бэкенд Docker
  backend-docker:
    needs: frontend-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Login to Yandex Container Registry
        uses: yc-actions/yc-cr-login@v1
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: |
            cr.yandex/${{ secrets.YC_REGISTRY_ID }}/crypto-backend:latest
            cr.yandex/${{ secrets.YC_REGISTRY_ID }}/crypto-backend:${{ github.sha }}

  # 6. Фронтенд Docker
  frontend-docker:
    needs: backend-docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Login to Yandex Container Registry
        uses: yc-actions/yc-cr-login@v1
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          build-args: |
            REACT_APP_API_URL=http://${{ secrets.SSH_HOST }}:8000
          push: true
          tags: |
            cr.yandex/${{ secrets.YC_REGISTRY_ID }}/crypto-frontend:latest
            cr.yandex/${{ secrets.YC_REGISTRY_ID }}/crypto-frontend:${{ github.sha }}

  # 7. Деплой
  deploy:
    needs: frontend-docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Ansible
        run: pip install ansible
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
      - name: Redeploy
        working-directory: ./cloud/ansible_playbooks
        run: |
          echo "[docker_hosts]" > inventory.ini
          echo "vm ansible_host=${{ secrets.SSH_HOST }} ansible_user=${{ secrets.SSH_USER }}" >> inventory.ini
          ansible-playbook -i inventory.ini deploy_k8s.yml \
            -e "yc_oauth_token=${{ secrets.YC_TOKEN }}" \
            -e "version=${{ github.sha }}" \
            -e "db_password=${{ secrets.DB_PASSWORD }}"