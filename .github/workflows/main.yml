name: CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]
    types: [ closed ]
  workflow_dispatch:

env:
  SONARQUBE_URL: http://${{ secrets.SSH_HOST }}:9000
  MIN_COVERAGE: 80

jobs:
  # 1. Бэкенд тесты + покрытие
  backend-test:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests with coverage
        working-directory: ./backend
        env:
          DATABASE_URL: sqlite:///:memory:
        run: |
          pytest tests/ -v --cov=. --cov-report=xml:coverage.xml --cov-report=html

      - name: Check coverage threshold
        working-directory: ./backend
        run: |
          COVERAGE=$(python -c "import xml.etree.ElementTree as ET; print(ET.parse('coverage.xml').getroot().attrib.get('line-rate', 0))")
          COVERAGE_PERCENT=$(echo "$COVERAGE * 100" | bc | cut -d. -f1)
          echo "Coverage: ${COVERAGE_PERCENT}%"
          if [ "$COVERAGE_PERCENT" -lt "${{ env.MIN_COVERAGE }}" ]; then
            echo "Coverage ${COVERAGE_PERCENT}% is below threshold ${MIN_COVERAGE}%"
            exit 1
          else
            echo "Coverage ${COVERAGE_PERCENT}% meets threshold ${MIN_COVERAGE}%"
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7

  # 2. SonarQube анализ (отдельная джоба)
  sonarqube:
    needs: backend-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: backend/

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies for coverage
        working-directory: ./backend
        run: pip install pytest-cov

      - name: Debug coverage file
        run: |
          ls -la backend/
          if [ -f backend/coverage.xml ]; then
            echo "Coverage file exists"
            head -20 backend/coverage.xml
          else
            echo "Coverage file not found"
          fi

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONARQUBE_URL }}
        with:
          args: >
            -Dsonar.projectKey=crypto-backend
            -Dsonar.projectName="Crypto Backend"
            -Dsonar.python.coverage.reportPaths=backend/coverage.xml
            -Dsonar.sources=backend
            -Dsonar.tests=backend/tests
            -Dsonar.exclusions=**/venv/**,**/__pycache__/**,**/migrations/**,**/tests/**
            -Dsonar.test.inclusions=backend/tests/**/*.py
            -Dsonar.python.version=3.11

      - name: Wait for SonarQube analysis
        run: sleep 10

      - name: SonarQube Quality Gate check
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt

  # 3. Фронтенд тесты
  frontend-test:
    needs: sonarqube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run tests with coverage
        working-directory: ./frontend
        run: |
          npm test -- --watchAll=false --coverage --coverageThreshold='{"global":{"lines":80}}'

  # 4. Бэкенд билд Docker
  backend-build:
    needs: frontend-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Yandex Container Registry
        uses: yc-actions/yc-cr-login@v1
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}

      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: |
            cr.yandex/${{ secrets.YC_REGISTRY_ID }}/crypto-backend:latest
            cr.yandex/${{ secrets.YC_REGISTRY_ID }}/crypto-backend:${{ github.sha }}

  # 5. Фронтенд билд Docker
  frontend-build:
    needs: backend-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Login to Yandex Container Registry
        uses: yc-actions/yc-cr-login@v1
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}

      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          build-args: |
            REACT_APP_API_URL=http://${{ secrets.SSH_HOST }}:8000
          push: true
          tags: |
            cr.yandex/${{ secrets.YC_REGISTRY_ID }}/crypto-frontend:latest
            cr.yandex/${{ secrets.YC_REGISTRY_ID }}/crypto-frontend:${{ github.sha }}

  # 6. Деплой
  deploy:
    needs: frontend-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Ansible
        run: pip install ansible

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Run Ansible playbook
        working-directory: ./cloud/ansible_playbooks
        run: |
          echo "[docker_hosts]" > inventory.ini
          echo "vm ansible_host=${{ secrets.SSH_HOST }} ansible_user=${{ secrets.SSH_USER }}" >> inventory.ini
          ansible-playbook -i inventory.ini deploy_k8s.yml \
            -e "yc_oauth_token=${{ secrets.YC_TOKEN }}" \
            -e "version=${{ github.sha }}" \
            -e "db_password=${{ secrets.DB_PASSWORD }}"