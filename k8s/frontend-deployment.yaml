apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: crypto-app
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: cr.yandex/crpkl4pgojohfidok157/crypto-frontend:27cd05a0a15cb3e912c430d616674808bfd3ff92
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: REACT_APP_API_URL
          value: "http://crypto.local/api"
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
      imagePullSecrets:
      - name: yandex-cr