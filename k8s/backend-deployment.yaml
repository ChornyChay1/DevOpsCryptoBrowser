apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: crypto-app
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: cr.yandex/crpkl4pgojohfidok157/crypto-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql+asyncpg://postgres:${DB_PASSWORD}@postgres:5432/crypto_db"
        - name: APP_NAME
          value: "Trading Indicators API"
        - name: DEBUG
          value: "false"
        - name: ENVIRONMENT
          value: "production"
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
      imagePullSecrets:
      - name: yandex-cr