---
- name: Настройка Kubernetes
  hosts: docker_hosts
  become: yes
  vars:
    namespace: "crypto-app"

  tasks:
    - name: Проверка кластера
      shell: kubectl get nodes
      become_user: ubuntu
      become: no
      register: nodes_status
      changed_when: false

    - name: Создание namespace
      shell: |
        kubectl create namespace {{ namespace }} --dry-run=client -o yaml | kubectl apply -f -
      become_user: ubuntu
      become: no

    - name: Включение metrics-server
      shell: minikube addons enable metrics-server
      become_user: ubuntu
      become: no
      changed_when: false

    # ----- ARGO CD ЧЕРЕЗ HELM -----
    - name: Добавление репозитория Argo CD
      shell: |
        helm repo add argo https://argoproj.github.io/argo-helm
        helm repo update
      become_user: ubuntu
      become: no

    - name: Создание namespace для Argo CD
      shell: kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
      become_user: ubuntu
      become: no

    - name: Установка Argo CD через Helm
      shell: |
        helm upgrade --install argocd argo/argo-cd \
          --namespace argocd \
          --set installCRDs=true \
          --set applicationsetController.enabled=false \
          --set server.service.type=NodePort \
          --set server.service.nodePortHttp=30080 \
          --set server.service.nodePortHttps=30443 \
          --wait \
          --timeout 5m
      become_user: ubuntu
      become: no
      register: argocd_install
      ignore_errors: yes

    - name: Ожидание готовности Argo CD подов
      shell: |
        kubectl wait --for=condition=ready pod --all -n argocd --timeout=120s
      become_user: ubuntu
      become: no
      ignore_errors: yes

    - name: Получение пароля admin Argo CD
      shell: |
        kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d
      become_user: ubuntu
      become: no
      register: argocd_password
      ignore_errors: yes

    - name: Вывод пароля Argo CD
      debug:
        msg: |
          Argo CD установлен
          URL: https://{{ hostvars[inventory_hostname].ansible_host }}:30443
          Логин: admin
          Пароль: {{ argocd_password.stdout | default('смотри в секрет argocd-initial-admin-secret') }}

    # ----- SONARQUBE -----
    - name: Установка vm.max_map_count для Elasticsearch
      shell: |
        sudo sysctl -w vm.max_map_count=524288
        echo "vm.max_map_count=524288" | sudo tee -a /etc/sysctl.conf
      become: yes

    - name: Добавление репозитория SonarQube
      shell: |
        helm repo add sonarqube https://SonarSource.github.io/helm-chart-sonarqube
        helm repo update
      become_user: ubuntu
      become: no

    - name: Создание namespace для SonarQube
      shell: kubectl create namespace sonarqube --dry-run=client -o yaml | kubectl apply -f -
      become_user: ubuntu
      become: no

    - name: Установка SonarQube через Helm
      shell: |
        helm upgrade --install sonarqube sonarqube/sonarqube \
          --namespace sonarqube \
          --set resources.requests.memory=2Gi \
          --set resources.requests.cpu=500m \
          --set resources.limits.memory=4Gi \
          --set resources.limits.cpu=2000m \
          --set service.type=NodePort \
          --set service.nodePort=30090 \
          --wait \
          --timeout 10m
      become_user: ubuntu
      become: no
      register: sonarqube_install
      ignore_errors: yes

    - name: Ожидание готовности SonarQube подов
      shell: |
        kubectl wait --for=condition=ready pod -l app=sonarqube -n sonarqube --timeout=300s
      become_user: ubuntu
      become: no
      ignore_errors: yes

    - name: Получение пароля admin SonarQube
      shell: |
        kubectl get secret sonarqube-sonarqube -n sonarqube -o jsonpath="{.data.sonarqube-password}" | base64 -d
      become_user: ubuntu
      become: no
      register: sonarqube_password
      ignore_errors: yes

    - name: Вывод пароля SonarQube
      debug:
        msg: |
          SonarQube установлен
          URL: http://{{ hostvars[inventory_hostname].ansible_host }}:30090
          Логин: admin
          Пароль: {{ sonarqube_password.stdout | default('смотри в секрет sonarqube-sonarqube') }}

    - name: Запуск порт-форвардинга для SonarQube
      shell: |
        pkill -f "port-forward.*sonarqube" 2>/dev/null || true
        nohup kubectl port-forward -n sonarqube svc/sonarqube-sonarqube 9000:9000 --address 0.0.0.0 > /tmp/sonarqube-fwd.log 2>&1 &
      become_user: ubuntu
      become: no

    # ----- PROMETHEUS + GRAFANA -----
    - name: Добавление репозитория Prometheus
      shell: |
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm repo update
      become_user: ubuntu
      become: no
      changed_when: false

    - name: Создание namespace для мониторинга
      shell: kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
      become_user: ubuntu
      become: no

    - name: Установка kube-prometheus-stack (Prometheus + Grafana)
      shell: |
        helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
          --namespace monitoring \
          --set prometheus.prometheusSpec.resources.requests.memory=512Mi \
          --set prometheus.prometheusSpec.resources.requests.cpu=200m \
          --set grafana.resources.requests.memory=128Mi \
          --set grafana.resources.requests.cpu=50m \
          --set alertmanager.alertmanagerSpec.resources.requests.memory=128Mi \
          --set alertmanager.alertmanagerSpec.resources.requests.cpu=50m \
          --wait \
          --timeout 10m
      become_user: ubuntu
      become: no
      register: helm_install
      ignore_errors: yes

    - name: Ожидание запуска Grafana
      shell: |
        kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=grafana -n monitoring --timeout=120s
      become_user: ubuntu
      become: no
      ignore_errors: yes

    - name: Запуск порт-форвардинга для Grafana
      shell: |
        pkill -f "port-forward.*grafana" 2>/dev/null || true
        nohup kubectl port-forward -n monitoring svc/monitoring-grafana 3000:80 --address 0.0.0.0 > /tmp/grafana-fwd.log 2>&1 &
      become_user: ubuntu
      become: no

    - name: Проверка подов мониторинга
      shell: kubectl get pods -n monitoring
      become_user: ubuntu
      become: no
      register: monitoring_pods
      changed_when: false

    - name: Результат
      debug:
        msg: |
          Kubernetes настроен
          Namespace: {{ namespace }}
          Argo CD: https://{{ hostvars[inventory_hostname].ansible_host }}:30443 (admin / пароль выше)
          SonarQube: http://{{ hostvars[inventory_hostname].ansible_host }}:30090 (admin / пароль выше)
          Grafana: http://{{ hostvars[inventory_hostname].ansible_host }}:3000 (admin / prom-operator)
          Проверка: kubectl get pods -n kube-system