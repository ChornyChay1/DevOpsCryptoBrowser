---
- name: Деплой в Kubernetes
  hosts: docker_hosts
  become: yes
  vars:
    version: "{{ version | default('1.0') }}"
    registry: "cr.yandex/crpkl4pgojohfidok157"
    namespace: "crypto-app"
    yc_oauth_token: "{{ yc_oauth_token | default('') }}"

  tasks:
    - name: Проверка кластера
      shell: kubectl get nodes
      become_user: ubuntu
      become: no
      register: nodes_status
      changed_when: false

    - name: Создание секретов
      block:
        - name: Yandex Registry
          shell: |
            kubectl create secret docker-registry yandex-cr \
              --namespace={{ namespace }} \
              --docker-server=cr.yandex \
              --docker-username=oauth \
              --docker-password="{{ yc_oauth_token }}" \
              --dry-run=client -o yaml | kubectl apply -f -
          when: yc_oauth_token != ""

        - name: PostgreSQL
          shell: |
            kubectl create secret generic postgres-secret \
              --namespace={{ namespace }} \
              --from-literal=POSTGRES_DB=crypto_db \
              --from-literal=POSTGRES_USER=postgres \
              --from-literal=POSTGRES_PASSWORD=postgres \
              --dry-run=client -o yaml | kubectl apply -f -
      become_user: ubuntu
      become: no

    - name: Очистка Docker (кроме Minikube)
      shell: |
        docker stop $(docker ps -q | grep -v $(docker ps -q --filter "name=minikube")) 2>/dev/null || true
        docker rm $(docker ps -aq | grep -v $(docker ps -aq --filter "name=minikube")) 2>/dev/null || true
        docker rmi $(docker images -q) 2>/dev/null || true
        docker system prune -a -f --volumes 2>/dev/null || true
      ignore_errors: yes

    - name: Создание папки для манифестов
      file:
        path: /opt/k8s-manifests
        state: directory
        mode: '0777'
      become: yes

    - name: Копирование манифестов
      copy:
        src: "{{ item }}"
        dest: "/opt/k8s-manifests/{{ item | basename }}"
        mode: '0644'
      loop: "{{ lookup('fileglob', '../k8s/*.yaml', wantlist=True) }}"
      become: yes

    - name: Применение манифестов
      shell: kubectl apply -f /opt/k8s-manifests/
      become_user: ubuntu
      become: no
      register: apply_result

    - name: Ожидание подов
      shell: kubectl wait --for=condition=ready pod --all --namespace={{ namespace }} --timeout=120s
      become_user: ubuntu
      become: no
      ignore_errors: yes

    - name: Настройка доступа
      block:
        - name: Получение публичного IP ВМ
          set_fact:
            vm_ip: "{{ hostvars[inventory_hostname].ansible_host }}"

        - name: Получение порта фронтенда
          shell: |
            kubectl get svc frontend -n {{ namespace }} -o jsonpath='{.spec.ports[0].nodePort}'
          become_user: ubuntu
          become: no
          register: frontend_port
          changed_when: false

        - name: Получение порта бэкенда
          shell: |
            kubectl get svc backend -n {{ namespace }} -o jsonpath='{.spec.ports[0].nodePort}'
          become_user: ubuntu
          become: no
          register: backend_port
          changed_when: false
          ignore_errors: yes

        - name: Статус подов
          shell: kubectl get pods -n {{ namespace }}
          become_user: ubuntu
          become: no
          register: pods_status

        - name: Статус сервисов
          shell: kubectl get svc -n {{ namespace }}
          become_user: ubuntu
          become: no
          register: svc_status

        - name: Запуск порт-форвардинга для фронтенда
          shell: |
            pkill -f "port-forward.*frontend" 2>/dev/null || true
            nohup kubectl port-forward -n {{ namespace }} svc/frontend {{ frontend_port.stdout }}:80 --address 0.0.0.0 > /tmp/frontend-fwd.log 2>&1 &
          become_user: ubuntu
          become: no

        - name: Запуск порт-форвардинга для бэкенда
          shell: |
            pkill -f "port-forward.*backend" 2>/dev/null || true
            nohup kubectl port-forward -n {{ namespace }} svc/backend 8000:8000 --address 0.0.0.0 > /tmp/backend-fwd.log 2>&1 &
          become_user: ubuntu
          become: no

        - name: Запуск порт-форвардинга для Grafana
          shell: |
            pkill -f "port-forward.*grafana" 2>/dev/null || true
            nohup kubectl port-forward -n monitoring svc/monitoring-grafana 3000:80 --address 0.0.0.0 > /tmp/grafana-fwd.log 2>&1 &
          become_user: ubuntu
          become: no

        - name: Проверка порт-форвардинга
          shell: |
            sleep 2
            sudo ss -tlnp | grep -E "{{ frontend_port.stdout }}|{{ backend_port.stdout }}"
          become_user: ubuntu
          become: no
          register: port_check
          changed_when: false

        - name: Результат порт-форвардинга
          debug:
            msg: "Порт-форвардинг запущен: {{ port_check.stdout_lines }}"
      become_user: ubuntu
      become: no

    - name: Финальный вывод
      debug:
        msg: |
          Успешно. Деплой завершен