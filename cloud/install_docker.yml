---
- name: Установка Docker, Kubernetes tools и зависимостей
  hosts: docker_hosts
  become: yes

  tasks:
    - name: Установка Yandex Cloud CLI
      shell: |
        curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
      args:
        creates: /home/ubuntu/yandex-cloud/bin/yc
      become_user: ubuntu
      become: no

    - name: Добавление yc в PATH
      lineinfile:
        path: /home/ubuntu/.bashrc
        line: 'export PATH="$PATH:$HOME/yandex-cloud/bin"'
        create: yes
      become_user: ubuntu
      become: no

    # ----- УСТАНОВКА DOCKER -----
    - name: Установка Docker из официального репозитория
      shell: |
        curl -fsSL https://get.docker.com -o get-docker.sh
        sh get-docker.sh
      args:
        creates: /usr/bin/docker

    - name: Добавление пользователя в группу docker
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Установка kubectl
      shell: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/
      args:
        creates: /usr/local/bin/kubectl

    - name: Установка Minikube
      shell: |
        curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
        sudo install minikube-linux-amd64 /usr/local/bin/minikube
      args:
        creates: /usr/local/bin/minikube

    - name: Установка Python и pip
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
        state: present
        update_cache: yes

    - name: Установка Docker SDK для Python
      pip:
        name: docker
        state: present
        executable: pip3

    - name: Установка Docker Compose плагина
      apt:
        name: docker-compose-plugin
        state: present

    - name: Установка дополнительных полезных пакетов
      apt:
        name:
          - curl
          - git
          - wget
          - conntrack
        state: present

    - name: Запуск Minikube кластера
      shell: |
        minikube start --driver=docker --cpus=4 --memory=8192
      become_user: ubuntu
      become: no
      register: minikube_start
      changed_when: false

    - name: Проверка статуса кластера
      shell: |
        kubectl get nodes
      become_user: ubuntu
      become: no
      register: kubectl_nodes
      changed_when: false

    - name: Информация о завершении
      debug:
        msg:
          - "Yandex Cloud CLI установлен"
          - "Docker установлен!"
          - "kubectl установлен"
          - "Minikube установлен и запущен"
          - "Kubernetes кластер готов!"
          - ""
          - "Проверка узлов:"
          - "{{ kubectl_nodes.stdout_lines }}"
          - ""
          - "Команды для проверки:"
          - "   kubectl get pods -A"
          - "   minikube dashboard"