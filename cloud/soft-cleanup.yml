---
- name: Остановка и очистка
  hosts: docker_hosts
  become: yes
  vars:
    namespace: "crypto-app"

  tasks:
    - name: Остановка порт-форвардинга
      shell: pkill -f "kubectl port-forward"
      ignore_errors: yes

    - name: Остановка подов
      shell: kubectl scale deployment --all -n {{ namespace }} --replicas=0
      ignore_errors: yes

    - name: Очистка Docker
      shell: |
        docker stop $(docker ps -aq) 2>/dev/null || true
        docker rm $(docker ps -aq) 2>/dev/null || true
        docker rmi $(docker images -q) 2>/dev/null || true
        docker system prune -a -f --volumes 2>/dev/null || true
      ignore_errors: yes

    - name: Результат
      debug:
        msg: "Остановка и очистка завершены"