---
- name: Деплой в Kubernetes
  hosts: docker_hosts
  become: yes
  vars:
    version: "{{ version | default('1.0') }}"
    registry: "cr.yandex/crpkl4pgojohfidok157"
    namespace: "crypto-app"
    yc_oauth_token: "{{ yc_oauth_token | default('') }}"

  tasks:
    # ----- ПРОВЕРКА КЛАСТЕРА -----
    - name: Проверка что кластер готов
      shell: kubectl get nodes
      become_user: ubuntu
      become: no
      register: nodes_status
      changed_when: false

    - name: Информация о кластере
      debug:
        msg: "✅ K8s кластер готов: {{ nodes_status.stdout_lines }}"

    # ----- СОЗДАНИЕ СЕКРЕТА ДЛЯ YANDEX REGISTRY -----
    - name: Создание секрета для доступа к реестру
      shell: |
        kubectl create secret docker-registry yandex-cr \
          --namespace={{ namespace }} \
          --docker-server=cr.yandex \
          --docker-username=oauth \
          --docker-password="{{ yc_oauth_token }}" \
          --dry-run=client -o yaml | kubectl apply -f -
      become_user: ubuntu
      become: no
      when: yc_oauth_token != ""

    - name: Проверка секрета
      shell: kubectl get secret yandex-cr -n {{ namespace }} -o jsonpath='{.type}'
      become_user: ubuntu
      become: no
      register: secret_status
      changed_when: false

    - name: Результат
      debug:
        msg: "✅ Секрет 'yandex-cr' создан: {{ secret_status.stdout }}"

    # ----- СОЗДАНИЕ СЕКРЕТА ДЛЯ POSTGRES -----
    - name: Создание секрета для PostgreSQL
      shell: |
        kubectl create secret generic postgres-secret \
          --namespace={{ namespace }} \
          --from-literal=POSTGRES_DB=crypto_db \
          --from-literal=POSTGRES_USER=postgres \
          --from-literal=POSTGRES_PASSWORD=postgres \
          --dry-run=client -o yaml | kubectl apply -f -
      become_user: ubuntu
      become: no

    - name: Проверка postgres секрета
      shell: kubectl get secret postgres-secret -n {{ namespace }} -o jsonpath='{.type}'
      become_user: ubuntu
      become: no
      register: postgres_secret_status
      changed_when: false

    - name: Результат postgres секрета
      debug:
        msg: "✅ Секрет 'postgres-secret' создан: {{ postgres_secret_status.stdout }}"

    # ----- КОПИРОВАНИЕ МАНИФЕСТОВ -----
    - name: Создание папки для манифестов
      file:
        path: /opt/k8s-manifests
        state: directory
        mode: '0755'

    - name: Копирование манифестов
      copy:
        src: "{{ item }}"
        dest: "/opt/k8s-manifests/{{ item | basename }}"
        mode: '0644'
      loop: "{{ lookup('fileglob', '../k8s/*.yaml', wantlist=True) }}"

    # ----- ПРИМЕНЕНИЕ МАНИФЕСТОВ -----
    - name: Применение всех манифестов
      shell: |
        kubectl apply -f /opt/k8s-manifests/
      become_user: ubuntu
      become: no
      register: apply_result

    - name: Результат применения
      debug:
        msg: "{{ apply_result.stdout_lines }}"

    # ----- ОЖИДАНИЕ ГОТОВНОСТИ -----
    - name: Ожидание готовности подов
      shell: |
        kubectl wait --for=condition=ready pod \
          --all \
          --namespace={{ namespace }} \
          --timeout=120s
      become_user: ubuntu
      become: no
      register: wait_result
      ignore_errors: yes

    # ----- ПОЛУЧЕНИЕ IP ДЛЯ ДОСТУПА -----
    - name: Получение публичного IP ВМ
      set_fact:
        vm_ip: "{{ hostvars[inventory_hostname].ansible_host }}"

    - name: Получение порта фронтенда
      shell: |
        kubectl get svc frontend -n {{ namespace }} -o jsonpath='{.spec.ports[0].nodePort}'
      become_user: ubuntu
      become: no
      register: frontend_port
      changed_when: false

    - name: Получение порта бэкенда
      shell: |
        kubectl get svc backend -n {{ namespace }} -o jsonpath='{.spec.ports[0].nodePort}'
      become_user: ubuntu
      become: no
      register: backend_port
      changed_when: false
      ignore_errors: yes

    # ----- СТАТУСЫ -----
    - name: Статус подов
      shell: kubectl get pods -n {{ namespace }}
      become_user: ubuntu
      become: no
      register: pods_status

    - name: Статус сервисов
      shell: kubectl get svc -n {{ namespace }}
      become_user: ubuntu
      become: no
      register: svc_status

    # ----- ФИНАЛЬНЫЙ ВЫВОД -----
    - name: Финальная информация
      debug:
        msg:
          - ""
          - "🎉 Деплой в Kubernetes завершён!"
          - "====================================="
          - ""
          - "📊 Namespace: {{ namespace }}"
          - "🔐 Секрет для Registry: создан"
          - ""
          - "🌐 ПРИЛОЖЕНИЕ ДОСТУПНО ПО АДРЕСАМ:"
          - "   📱 FRONTEND: http://{{ vm_ip }}:{{ frontend_port.stdout }}"
          - "   🔧 BACKEND:  http://{{ vm_ip }}:{{ backend_port.stdout | default('не настроен') }}"
          - "   📚 API Docs: http://{{ vm_ip }}:{{ backend_port.stdout }}/docs"
          - ""
          - "🔧 Проверка:"
          - "   kubectl get pods -n {{ namespace }}"
          - "   kubectl get svc -n {{ namespace }}"
          - "   kubectl get hpa -n {{ namespace }}"