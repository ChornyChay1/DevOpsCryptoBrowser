---
- name: Деплой в Kubernetes
  hosts: docker_hosts
  become: yes
  vars:
    version: "{{ version | default('1.0') }}"
    registry: "cr.yandex/crpkl4pgojohfidok157"
    namespace: "crypto-app"
    yc_oauth_token: "{{ yc_oauth_token | default('') }}"

  tasks:
    - name: Проверка кластера
      shell: kubectl get nodes
      become_user: ubuntu
      become: no
      register: nodes_status
      changed_when: false

    - name: Создание секретов
      block:
        - name: Yandex Registry
          shell: |
            kubectl create secret docker-registry yandex-cr \
              --namespace={{ namespace }} \
              --docker-server=cr.yandex \
              --docker-username=oauth \
              --docker-password="{{ yc_oauth_token }}" \
              --dry-run=client -o yaml | kubectl apply -f -
          when: yc_oauth_token != ""

        - name: PostgreSQL
          shell: |
            kubectl create secret generic postgres-secret \
              --namespace={{ namespace }} \
              --from-literal=POSTGRES_DB=crypto_db \
              --from-literal=POSTGRES_USER=postgres \
              --from-literal=POSTGRES_PASSWORD=postgres \
              --dry-run=client -o yaml | kubectl apply -f -
      become_user: ubuntu
      become: no

    - name: Очистка Docker (кроме Minikube)
      shell: |
        docker stop $(docker ps -q | grep -v $(docker ps -q --filter "name=minikube")) 2>/dev/null || true
        docker rm $(docker ps -aq | grep -v $(docker ps -aq --filter "name=minikube")) 2>/dev/null || true
        docker rmi $(docker images -q) 2>/dev/null || true
        docker system prune -a -f --volumes 2>/dev/null || true
      ignore_errors: yes

    - name: Применение манифестов
      block:
        - name: Создание папки
          file:
            path: /opt/k8s-manifests
            state: directory
            mode: '0755'
          become: yes

        - name: Копирование манифестов
          copy:
            src: "{{ item }}"
            dest: "/opt/k8s-manifests/{{ item | basename }}"
            mode: '0644'
          loop: "{{ lookup('fileglob', '../k8s/*.yaml', wantlist=True) }}"
          become: yes

        - name: kubectl apply
          shell: kubectl apply -f /opt/k8s-manifests/
          become_user: ubuntu
          become: no

        - name: Ожидание подов
          shell: kubectl wait --for=condition=ready pod --all --namespace={{ namespace }} --timeout=120s
          become_user: ubuntu
          become: no
          ignore_errors: yes
      become_user: ubuntu
      become: no

    - name: Настройка доступа
      block:
        - name: Получение IP и портов
          set_fact:
            vm_ip: "{{ hostvars[inventory_hostname].ansible_host }}"
            frontend_port: "{{ lookup('k8s', kind='Service', namespace=namespace, resource_name='frontend').spec.ports[0].nodePort }}"
            backend_port: "{{ lookup('k8s', kind='Service', namespace=namespace, resource_name='backend').spec.ports[0].nodePort | default('') }}"

        - name: Запуск порт-форвардинга
          shell: |
            pkill -f "kubectl port-forward" 2>/dev/null || true
            nohup kubectl port-forward -n {{ namespace }} svc/frontend {{ frontend_port }}:80 --address 0.0.0.0 > /tmp/frontend-fwd.log 2>&1 &
            nohup kubectl port-forward -n {{ namespace }} svc/backend 8000:8000 --address 0.0.0.0 > /dev/null 2>&1 &
          become_user: ubuntu
          become: no
          changed_when: false

        - name: Проверка портов
          shell: sleep 2 && sudo ss -tlnp | grep -E "{{ frontend_port }}|8000"
          register: port_check
          changed_when: false
      become_user: ubuntu
      become: no

    - name: Финальный вывод
      debug:
        msg: |
          Успешно. Деплой завершен